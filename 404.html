<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Lost in Space | Stackly</title>
    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap"
      rel="stylesheet"
    />
    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      :root {
        --primary-blue: #0066ff;
        --dark-blue: #004ecc;
        --accent-orange: #ff8a00;
        --text-main: #1a1a1a;
        --text-gray: #777777;
        --bg-light: #fdfdff;
        --btn-gradient: linear-gradient(90deg, #4364f7, #304ffe);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }
      html,
      body {
        max-width: 100%;
        overflow-x: hidden;
      }
      body {
        background-color: var(--bg-light);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow-x: hidden;
        position: relative;
        color: var(--text-main);
      }

      /* Minimal Background Decor */
      .grid-bg {
        position: absolute;
        width: 100%;
        height: 100%;
        background-image: radial-gradient(
          circle at 2px 2px,
          rgba(0, 102, 255, 0.05) 1px,
          transparent 0
        );
        background-size: 30px 30px;
        z-index: 0;
      }

      .orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        z-index: 1;
        opacity: 0.3;
      }

      /* Container */
      .container {
        position: relative;
        z-index: 10;
        text-align: center;
        padding: 24px;
        width: 100%;
        max-width: 800px;
        margin: auto;
      }

      /* 404 Typography */
      .error-num-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 5px;
        margin-bottom: -10px;
      }

      .digit {
        font-size: clamp(80px, 25vw, 180px);
        font-weight: 800;
        line-height: 1;
        background: linear-gradient(180deg, #1a1a1a 30%, #4364f7 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        display: inline-block;
        opacity: 0;
      }

      /* Creative Illustration - The Searching Eye */
      .eye-container {
        width: clamp(70px, 18vw, 120px);
        height: clamp(70px, 18vw, 120px);
        background: white;
        border-radius: 50%;
        margin: 20px 0;
        position: relative;
        box-shadow: 0 10px 40px rgba(0, 102, 255, 0.1);
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(0, 102, 255, 0.1);
        opacity: 0;
        transform: scale(0);
        flex-shrink: 0;
      }

      .pupil {
        width: 35%;
        height: 35%;
        background: var(--primary-blue);
        border-radius: 50%;
        position: relative;
        transition: transform 0.1s ease-out;
      }

      .pupil::after {
        content: "";
        position: absolute;
        top: 20%;
        left: 20%;
        width: 30%;
        height: 30%;
        background: white;
        border-radius: 50%;
      }

      /* Content */
      .text-content {
        margin-top: 20px;
      }

      h2 {
        font-size: clamp(22px, 6vw, 36px);
        font-weight: 700;
        margin-bottom: 12px;
        opacity: 0;
        line-height: 1.2;
      }

      p {
        color: var(--text-gray);
        font-size: clamp(14px, 4vw, 16px);
        max-width: 440px;
        margin: 0 auto 32px;
        line-height: 1.6;
        opacity: 0;
        padding: 0 10px;
      }

      /* Buttons */
      .btn-group {
        display: flex;
        gap: 12px;
        justify-content: center;
        flex-direction: column; /* Mobile first */
        align-items: center;
        opacity: 0;
      }

      @media (min-width: 640px) {
        .btn-group {
          flex-direction: row;
        }
      }

      .btn {
        padding: 16px 32px;
        border-radius: 16px 16px 16px 32px; /* Stackly brand radius */
        font-weight: 600;
        text-decoration: none;
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        font-size: 15px;
        width: 100%;
        max-width: 280px;
      }

      @media (min-width: 640px) {
        .btn {
          width: auto;
        }
      }

      .btn-primary {
        background: var(--btn-gradient);
        color: white;
        box-shadow: 0 8px 25px rgba(67, 100, 247, 0.25);
      }

      .btn-secondary {
        background: white;
        color: var(--text-main);
        border: 1px solid rgba(0, 0, 0, 0.1);
      }

      .btn:hover {
        transform: scale(1.03) translateY(-3px);
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
      }

      /* Responsive Fixes for Orbs */
      @media (max-width: 768px) {
        .orb {
          width: 200px !important;
          height: 200px !important;
          filter: blur(50px);
        }
      }
    </style>
  </head>
  <body>
    <div class="grid-bg"></div>
    <div
      class="orb"
      style="
        width: 400px;
        height: 400px;
        background: #4364f7;
        top: -100px;
        left: -100px;
      "
    ></div>
    <div
      class="orb"
      style="
        width: 300px;
        height: 300px;
        background: #ff8a00;
        bottom: -50px;
        right: -50px;
        opacity: 0.15;
      "
    ></div>

    <div class="container">
      <div class="error-num-wrapper">
        <span class="digit">4</span>
        <div class="eye-container">
          <div class="pupil"></div>
        </div>
        <span class="digit">4</span>
      </div>

      <div class="text-content">
        <h2>Lost in the Stack?</h2>
        <p>
          The page you're looking for doesn't exist or has been moved to a
          different coordinate in the digital space.
        </p>
      </div>

      <div class="btn-group">
        <a href="./index.html" class="btn btn-primary">
          <i data-lucide="home" size="18"></i> Back to Home
        </a>
        <a href="./contact.html" class="btn btn-secondary">
          <i data-lucide="help-circle" size="18"></i> Contact Support
        </a>
      </div>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        lucide.createIcons();

        // 1. Entrance Sequence
        const tl = gsap.timeline({ defaults: { ease: "expo.out" } });

        tl.to(".digit", {
          opacity: 1,
          y: 0,
          stagger: 0.15,
          duration: 1.2,
          startAt: { y: 60 },
        })
          .to(
            ".eye-container",
            {
              opacity: 1,
              scale: 1,
              duration: 1,
              ease: "back.out(1.7)",
            },
            "-=1",
          )
          .to(
            "h2",
            {
              opacity: 1,
              y: 0,
              duration: 0.8,
              startAt: { y: 20 },
            },
            "-=0.6",
          )
          .to(
            "p",
            {
              opacity: 1,
              y: 0,
              duration: 0.8,
              startAt: { y: 15 },
            },
            "-=0.6",
          )
          .to(
            ".btn-group",
            {
              opacity: 1,
              y: 0,
              duration: 0.8,
              startAt: { y: 15 },
            },
            "-=0.6",
          );

        // 2. Responsive Interactive Eye Movement
        const eyeContainer = document.querySelector(".eye-container");
        const pupil = document.querySelector(".pupil");

        const handleMove = (e) => {
          const x = e.clientX || (e.touches && e.touches[0].clientX);
          const y = e.clientY || (e.touches && e.touches[0].clientY);

          if (!x || !y) return;

          const rect = eyeContainer.getBoundingClientRect();
          const eyeX = rect.left + rect.width / 2;
          const eyeY = rect.top + rect.height / 2;

          const angle = Math.atan2(y - eyeY, x - eyeX);
          // Calculate max distance relative to container size
          const maxMove = rect.width * 0.2;
          const distance = Math.min(
            maxMove,
            Math.hypot(x - eyeX, y - eyeY) / 10,
          );

          const moveX = Math.cos(angle) * distance;
          const moveY = Math.sin(angle) * distance;

          gsap.to(pupil, {
            x: moveX,
            y: moveY,
            duration: 0.4,
            ease: "power2.out",
          });
        };

        document.addEventListener("mousemove", handleMove);
        document.addEventListener("touchmove", handleMove);

        // 3. Subtle Orb Floating
        gsap.to(".orb", {
          x: "random(-30, 30)",
          y: "random(-30, 30)",
          duration: 6,
          repeat: -1,
          yoyo: true,
          ease: "sine.inOut",
          stagger: 1,
        });

        // 4. Digits & Eye Floating Cycle
        gsap.to([".digit", ".eye-container"], {
          y: -8,
          duration: 2.5,
          repeat: -1,
          yoyo: true,
          ease: "sine.inOut",
          stagger: 0.2,
        });
      });
    </script>
  </body>
</html>
